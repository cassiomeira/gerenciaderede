version: '3.8'

services:
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - backend-data:/app/prisma/data
      - whatsapp-session:/app/whatsapp-session
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/app/prisma/data/master.db
      - JWT_SECRET=${JWT_SECRET:-NETMONITOR_SECRET_PROD_2026}
      - IXC_TOKEN=${IXC_TOKEN}
      - IXC_URL=${IXC_URL}
      - CSV_PATH=/app/dispositivos_monitoramento.csv
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - NE8000_HOST=${NE8000_HOST:-177.184.190.193}
      - NE8000_SSH_PORT=${NE8000_SSH_PORT:-2222}
      - NE8000_SSH_USER=${NE8000_SSH_USER:-suporte}
      - NE8000_SSH_PASS=${NE8000_SSH_PASS}
      - NE8000_SNMP_COMMUNITY=${NE8000_SNMP_COMMUNITY:-Netcar@2024ro}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    restart: unless-stopped
    expose:
      - "3001"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    expose:
      - "80"
    restart: unless-stopped
    depends_on:
      - backend

volumes:
  backend-data:
  whatsapp-session:
